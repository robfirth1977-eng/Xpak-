function annualise(rate, unit) {
  const n = parseFloat(rate);
  if (isNaN(n) || n <= 0) return 0;
  if (unit === "rolls/week" || unit === "units/week") return Math.round(n * 52);
  if (unit === "rolls/month" || unit === "units/month") return Math.round(n * 12);
  if (unit === "pallets/month") return Math.round(n * 12);
  return Math.round(n);
}

  return TRIP_DATA_DEFAULT;
}
function saveVisits(visits) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(visits)); } catch(e) {}
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {

    const rec = new SR();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = "en-AU";
    let finalText = "";
    rec.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript + " ";
        else interim += e.results[i][0].transcript;
      }
      setTranscript(finalText + interim);
    };
    rec.onerror = (e) => { setRecordError("Mic error: " + e.error); setRecordState("idle"); };
    recognitionRef.current = rec;
    rec.start();
    setRecordState("recording");
  };

  const stopRecording = () => {
    if (recognitionRef.current) { recognitionRef.current.stop(); recognitionRef.current = null; }
    setRecordState("idle");
  };

  const summariseNote = async () => {

        method: "POST",
        headers: { "Content-Type": "application/json","Authorization":"Bearer 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 },
        body: JSON.stringify({
          model: "gpt-40-mini",
          max_tokens: 800,
          messages: [{
            role: "user",
            content: `You are an expert B2B sales assistant for X-Pak, a packaging and load restraint company. Analyse these raw voice-to-text field sales call notes and produce a structured CRM summary.

Extract and organise the following where present:
**CONTACTS:** Name, role, relationship notes, buying style or personality cues
**PRODUCTS:** SKU codes if mentioned, product descriptions, quantities, pack sizes
**COMPETITIVE INTEL:** Current supplier, prices they are paying, any pricing anchors mentioned
**VOLUME & VALUE:** Usage rates (per week/month), annualised estimate, flag if uncertain
**OPPORTUNITY:** What X-Pak can offer, pricing position, likelihood of winning
**NEXT STEPS:** Specific actions required, follow-up needed, quotes to send
**NOTES:** Anything else relevant (timing, logistics, context)

Be concise and specific. Flag calculations that need checking. Use the speaker's own words for memorable quotes or buying signals. If a SKU is mentioned or can be inferred, include it.

Account: \${noteAccount||"Not specified"}
Raw notes:
\${text}`
          }]
        })
      });
      const data = await resp.json();
      const summary = data.choices?.map(b => b.text||"").join("") || "Could not summarise.";

      };
      setNotes(n => [newNote, ...n]);
      setTranscript("");
      setNoteAccount("");
      setRecordState("idle");

      setRecordError("Summarise failed — check your connection.");

  useEffect(() => {

  const lineVal = (p) => fmt(p.lineEAS);

  const calculate = () => {

    });
    const totalEAS = prods.reduce((s,p)=>s+p.lineEAS, 0);
    const r = getrank(totalEAS);
    const alerts = [];

    const sfText =
`ACCOUNT: ${form.accountName} (${form.location||"—"})
DM: ${form.decisionMaker||"—"} | Influencer: ${form.influencer||"—"}
Procurement: ${form.procurement||"—"} | Owner: ${form.owner||"—"}
Current Supplier: ${form.currentSupplier||"—"}

PRODUCTS DISCUSSED:
${prods.map((p,i)=>{
  const s=p.selectedSKU;
  return `  ${i+1}. ${s?s.desc:(p.formCat||"Product")} | SKU: ${s?s.sku:"—"} | ${p.ann?`${p.ann.toLocaleString()} ${p.usageUnit} = $${lineVal(p)}`:"Usage TBC"} | Pain: ${p.painPoint||"—"}`;
}).join("\n")}

COMMERCIAL:
Trial: ${form.trialAgreed??"—"} | Quote: ${form.quoteRequired??"—"} | Urgency: ${form.urgency||"—"}
Follow-up: ${form.followUpDate||"—"}

EST. ANNUAL SPEND: $${fmt(totalEAS)}
ACCOUNT RANK: ${r}`;

    const emailText =
`Hi ${form.decisionMaker||"[Name]"},

Great connecting today at ${form.accountName}. Quick summary:
${form.trialAgreed==="Y"?"\n✅ Trial agreed — I'll get the details across shortly.":""}${form.quoteRequired==="Y"?"\n📄 Quote to follow based on your usage.":""}

Products discussed:
${prods.map(p=>{
  const s=p.selectedSKU;
  return `• ${s?s.desc:(p.formCat||"Product")}${s?` (${s.sku})`:""} — ${p.ann?`${p.ann.toLocaleString()} ${p.usageUnit}`:"usage to confirm"}${p.painPoint?` · ${p.painPoint}`:""}`;
}).join("\n")}

Est. annual value: $${fmt(totalEAS)}

I'll follow up ${form.followUpDate?`on ${form.followUpDate}`:"in the next few days"}.

Best,
[Your Name] | X-Pak`;

    if (form.visitId) {
      setVisits(vs=>vs.map(v=>v.id===form.visitId?{
        ...v,
        status: form.trialAgreed==="Y"?"done":alerts.length>0?"follow":"visited",
        eas: totalEAS,
      }:v));
    }
    setOutput({prods, totalEAS, rank:r, alerts, sfText, emailText, accountName:form.accountName, location:form.location});
    setTab("output");
  };

  const copy = (text, key) => {
    navigator.clipboard.writeText(text).catch(()=>{
      // fallback for older iOS
      const el = document.createElement('textarea');
      el.value = text; document.body.appendChild(el);
      el.select(); document.execCommand('copy');
      document.body.removeChild(el);
    });
    setCopied(key); setTimeout(()=>setCopied(""), 2000);
  };

  const addManual = () => {
    const id = Date.now();
    setVisits(vs=>[...vs, {...manualAcc, id, status:"planned", eas:null}]);
    setManualAcc({name:"",location:"",category:"",day:"TUE"});
    setShowManual(false);
  };

  const displayVisits = filterDay==="ALL" ? visits : visits.filter(v=>v.day===filterDay);
  const totalEAS = visits.reduce((s,v)=>s+(v.eas||0),0);
  const doneCount  = visits.filter(v=>v.status==="done"||v.status==="visited").length;
  const followCount= visits.filter(v=>v.status==="follow").length;

  const pillL = (s) => ({planned:"☐ Planned",visited:"Visited",follow:"⚠️ Follow-Up",done:"✅ Done",tbc:"TBC"}[s]||s);

  const filteredCat = catSearch.trim().length>1
    ? PRICELIST.filter(p=>p.sku.toLowerCase().includes(catSearch.toLowerCase())||p.desc.toLowerCase().includes(catSearch.toLowerCase()))
    : PRICELIST;

  return (
    <div className="app">

          <div>
            <div className="logo">X<em>-PAK</em></div>

          <button className={`tab ${tab==="log"?"on":""}`}       onClick={()=>setTab("log")}>Log Visit</button>
          <button className={`tab ${tab==="catalogue"?"on":""}`} onClick={()=>setTab("catalogue")}>Catalogue</button>
          <button className={`tab ${tab==="notes"?"on":""}`} onClick={()=>setTab("notes")}>Notes{notes.length>0?` (${notes.length})`:""}</button>
          {output && <button className={`tab ${tab==="output"?"on":""}`} onClick={()=>setTab("output")}>Output</button>}
        </div>
      </div>

      {/* RUN SHEET */}
      {tab==="run" && (
        <div className="content">
          {savedFlash && <div className="save-banner">✓ Progress saved</div>}
          <div className="trip-stats">

          </div>

          <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto"}}>
            {["ALL","TUE","WED","THU","FRI"].map(d=>(
              <button key={d} onClick={()=>setFilterDay(d)} style={{
                padding:"6px 12px",border:"1px solid",borderRadius:4,cursor:"pointer",
                fontFamily:"var(--display)",fontWeight:700,fontSize:11,letterSpacing:1,whiteSpace:"nowrap",flexShrink:0,

          {DAYS.filter(d=>filterDay==="ALL"||filterDay===d.id).map(day=>{

                {dayVisits.map(v=>(
                  <div key={v.id} className={vcCls(v.status)} onClick={()=>{if(!v.isTBC){setForm(newForm(v));setTab("log");}}}>
                    <div className="vc-top">
                      <div className={`vc-name${v.isTBC?" tbc":""}`}>{v.name}</div>

                      <option>rolls/month</option>

            <div className="field"><label className="lbl">Urgency</label>
              <div className="tog-row">
                <button className={`tog ${form.urgency==="H"?"t-h":""}`} onClick={()=>upForm("urgency",form.urgency==="H"?null:"H")}>🔴 High</button>
                <button className={`tog ${form.urgency==="M"?"t-m":""}`} onClick={()=>upForm("urgency",form.urgency==="M"?null:"M")}>🟡 Med</button>
                <button className={`tog ${form.urgency==="L"?"t-l":""}`} onClick={()=>upForm("urgency",form.urgency==="L"?null:"L")}>🟢 Low</button>
              </div>
            </div>
            <div className="field" style={{marginBottom:0}}><label className="lbl">Follow-Up Date</label><input className="inp" type="date" value={form.followUpDate} onChange={e=>upForm("followUpDate",e.target.value)} /></div>
          </div>

          <button className="btn btn-fire" onClick={calculate}>🔥 Calculate Opportunity</button>
          <button className="btn btn-ghost" onClick={()=>setTab("run")}>← Back to Run Sheet</button>
        </div>
      )}

      {/* CATALOGUE */}
      {tab==="catalogue" && (
        <div className="content">
          <div className="sec-label" style={{marginBottom:12}}>X-Pak Catalogue · {PRICELIST.length} SKUs</div>
          <input className="search-box" placeholder="Search SKU or product…" value={catSearch} onChange={e=>setCatSearch(e.target.value)} />
          {(catSearch.trim().length>1?[null]:CAT_GROUPS).map((group)=>{
            const rows = catSearch.trim().length>1 ? filteredCat : filteredCat.filter(p=>p.cat===group);
            if (!rows.length) return null;
            return (
              <div className="cat-section" key={group||"search"}>
                {group && <div className="cat-section-title">{group}</div>}
                {rows.map(p=>(
                  <div key={p.sku} className="cat-row" onClick={()=>{
                    const f=newForm();
                    const matchCat=Object.entries(CAT_MAP).find(([,v])=>v.includes(p.cat));
                    f.products[0].formCat=matchCat?matchCat[0]:"Other";
                    f.products[0].selectedSKU=p;
                    setForm(f); setTab("log");
                  }}>
                    <span className="cat-sku">{p.sku}</span>
                    <span className="cat-name">{p.desc}</span>
                    <span className="cat-price">${p.price.toFixed(2)}<br/><span className="cat-unit">{p.unit} · {p.gp}%GP</span></span>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}

      {/* NOTES */}
      {tab==="notes" && (
        <div className="content">
          <div className="sec-label" style={{marginBottom:12}}>Voice Notes · {notes.length} saved</div>

          {/* Record panel */}
          <div className="section-card" style={{marginBottom:16}}>
            <div className="field">
              <label className="lbl">Account</label>
              <select className="note-acc-select" value={noteAccount} onChange={e=>setNoteAccount(e.target.value)}>
                <option value="">General / Trip Note</option>
                {visits.filter(v=>!v.isTBC).map(v=><option key={v.id} value={v.name}>{v.name} — {v.location}</option>)}
              </select>
            </div>

            <button
              className={`record-btn ${recordState}`}
              onClick={recordState==="recording" ? stopRecording : startRecording}
              disabled={recordState==="processing"}
            >
              {recordState==="idle" && <><span>🎤</span> Tap to Record</>}
              {recordState==="recording" && <><span>⏹</span> Recording… Tap to Stop</>}
              {recordState==="processing" && <><span>⏳</span> Summarising…</>}
            </button>

            {transcript && (
              <textarea
                className="transcript-box"
                value={transcript}
                onChange={e=>setTranscript(e.target.value)}
                placeholder="Transcript appears here — you can also type or edit…"
              />
            )}

            {recordError && <div className="alert-inline">⚠️ {recordError}</div>}

            {transcript && recordState!=="processing" && (
              <button className="btn btn-fire" onClick={summariseNote}>✨ Summarise with AI</button>
            )}
          </div>

          {/* Saved notes */}
          {notes.length===0 ? (
            <div className="empty-notes">
              <div className="big">🎤</div>
              <div>Tap record above, speak your call notes,<br/>then hit Summarise to save them here.</div>
            </div>
          ) : notes.map(note=>(
            <div key={note.id} className="note-card">
              <div className="note-card-header">
                <div>
                  <div className="note-account-name">{note.account}</div>
                  <div className="note-time">{note.date} · {note.time}</div>
                </div>
                <button className="del-note" onClick={()=>deleteNote(note.id)}>🗑</button>
              </div>
              {note.summary && (
                <>
                  <div className="note-summary-label">AI Summary</div>
                  <div className="note-summary">{note.summary}</div>
                </>
              )}
              {note.raw && (
                <details style={{marginTop:10}}>
                  <summary style={{fontSize:10,color:"var(--muted)",cursor:"pointer",fontFamily:"var(--mono)"}}>Raw transcript ▾</summary>
                  <div className="note-raw" style={{marginTop:6}}>{note.raw}</div>
                </details>
              )}
              <button className="btn btn-ghost" style={{marginTop:12,fontSize:11,padding:"8px",letterSpacing:1}} onClick={()=>{
                const text = `CALL NOTES — ${note.account} (${note.date} ${note.time})\n\n${note.summary}`;
                navigator.clipboard.writeText(text).catch(()=>{});
                setCopied("note-"+note.id);
                setTimeout(()=>setCopied(""),2000);
              }}>{copied==="note-"+note.id?"✅ Copied!":"📋 Copy to CRM"}</button>
            </div>
          ))}
        </div>
      )}

            {/* OUTPUT */}
      {tab==="output" && output && (
        <div className="content">
          <div className="out-hero">
            <div className="out-account">{output.accountName} {output.location && <span style={{fontSize:14,color:"var(--muted)",fontWeight:400}}>· {output.location}</span>}</div>
            <div className="out-grid">
              <div><div className="out-val accent">${fmt(output.totalEAS)}</div><div className="out-lbl">Annual Revenue</div></div>
              <div><div className="out-val green">{output.rank==="A"?"🏆":output.rank==="B"?"📈":"📌"} Rank {output.rank}</div><div className="out-lbl">{output.rank==="A"?"$100k+ Priority":output.rank==="B"?"$30–100k":"Sub-$30k"}</div></div>
            </div>
            <div className={`rank-chip rank-${output.rank}`}>RANK {output.rank}</div>
          </div>

          {output.alerts.map(a=><div key={a} className="alert-inline">⚠️ {a}</div>)}

          <div className="sec-label">Product Breakdown</div>
          <div className="out-block">
            {output.prods.map(p=>{
              const s=p.selectedSKU;
              return (
                <div key={p.id} className="prod-out-row">
                  <div>
                    <div className="por-name">{s?s.desc:(p.formCat||"Product")}</div>
                    <div className="por-sku">{s?`${s.sku} · $${s.price.toFixed(2)}/${s.unit} · ${s.gp}% GP`:"No SKU selected"}</div>
                    {p.painPoint && <div className="por-pain">💬 {p.painPoint}</div>}
                  </div>
                  <div style={{textAlign:"right",marginLeft:10,flexShrink:0}}>
                    <div className="por-price">{p.lineEAS>0?`$${fmt(p.lineEAS)}`:"—"}</div>
                    <div className="por-ann">{p.ann>0?`${p.ann.toLocaleString()} units/yr`:"Usage TBC"}</div>
                  </div>
                </div>
              );
            })}
          </div>

          <div className="sec-label">Salesforce Update</div>
          <div className="out-block"><pre>{output.sfText}</pre></div>
          <button className="btn btn-ghost" onClick={()=>copy(output.sfText,"sf")}>{copied==="sf"?"✅ Copied!":"📋 Copy CRM Summary"}</button>
          {copied==="sf" && <div className="copy-ok">Paste into Salesforce</div>}

          <div className="sec-label" style={{marginTop:14}}>Follow-Up Email</div>
          <div className="out-block"><pre>{output.emailText}</pre></div>
          <button className="btn btn-ghost" onClick={()=>copy(output.emailText,"email")}>{copied==="email"?"✅ Copied!":"📧 Copy Email Draft"}</button>
          {copied==="email" && <div className="copy-ok">Ready to send</div>}

          <button className="btn btn-accent" style={{marginTop:14}} onClick={()=>{setForm(newForm());setOutput(null);setTab("log");}}>➕ Log Next Visit</button>
          <button className="btn btn-ghost" onClick={()=>setTab("run")}>← Back to Run Sheet</button>
        </div>
      )}

      {tab==="run" && <button className="fab" onClick={()=>{setForm(newForm());setTab("log");}}>➕</button>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>

</html>
