// ─── HELPERS ───────────────────────────────────────────────────────────────── 

const fmt = (n) => n.toLocaleString("en-AU", { maximumFractionDigits: 0 }); 

function annualise(rate, unit) { 

  const n = parseFloat(rate); 

  if (isNaN(n) || n <= 0) return 0; 

  if (unit === "rolls/week" || unit === "units/week") return Math.round(n * 52); 

  if (unit === "rolls/month" || unit === "units/month") return Math.round(n * 12); 

  if (unit === "pallets/month") return Math.round(n * 12); 

  return Math.round(n); 

} 

const getrank = (eas) => eas >= 100000 ? "A" : eas >= 30000 ? "B" : "C"; 

const newProd = () => ({ id: Date.now() + Math.random(), formCat:"", selectedSKU:null, usageRate:"", usageUnit:"rolls/week", supplier:"", painPoint:"" }); 

const newForm = (v={}) => ({ 

  visitId: v.id||null, accountName: v.name||"", location: v.location||"", 

  decisionMaker:"", influencer:"", procurement:"", owner:"", currentSupplier:"", 

  products:[newProd()], trialAgreed:null, quoteRequired:null, urgency:null, followUpDate:"", 

}); 

 

// ─── STORAGE ───────────────────────────────────────────────────────────────── 

const STORE_KEY = "xpak_visits_v1"; 

function loadVisits() { 

  try { 

    const saved = localStorage.getItem(STORE_KEY); 

    if (saved) return JSON.parse(saved); 

  } catch(e) {} 

  return TRIP_DATA_DEFAULT; 

} 

function saveVisits(visits) { 

  try { localStorage.setItem(STORE_KEY, JSON.stringify(visits)); } catch(e) {} 

}

      const chunks = []; 

      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); }; 

      mediaRecorder.onstop = async () => { 

        stream.getTracks().forEach(t => t.stop()); 

        setRecordState("transcribing"); 

        const apiKey = getApiKey(); 

        if (!apiKey) { setShowKeyEntry(true); setRecordState("idle"); return; } 

        try { 

          const mimeType = chunks[0]?.type || "audio/webm"; 

          const ext = mimeType.includes("mp4") ? "mp4" : "webm"; 

          const audioBlob = new Blob(chunks, { type: mimeType }); 

          const formData = new FormData();

            method: "POST", 

            headers: { "Authorization": "Bearer " + apiKey }, 

            body: formData

          const data = await resp.json();

\${text}`

              <div style={{fontFamily:"var(--display)",fontWeight:800,fontSize:12,letterSpacing:2,textTransform:"uppercase",color:"var(--accent)",marginBottom:12}}>New Account</div> 

              <div className="frow"> 

                <div className="field"><label className="lbl">Name *</label><input className="inp" value={manualAcc.name} onChange={e=>setManualAcc(m=>({...m,name:e.target.value}))} /></div> 

                <div className="field"><label className="lbl">Location</label><input className="inp" value={manualAcc.location} onChange={e=>setManualAcc(m=>({...m,location:e.target.value}))} /></div> 

              </div> 

              <div className="frow"> 

                <div className="field"><label className="lbl">Category</label><input className="inp" value={manualAcc.category} onChange={e=>setManualAcc(m=>({...m,category:e.target.value}))} /></div> 

                <div className="field"><label className="lbl">Day</label> 

                  <select className="sel" value={manualAcc.day} onChange={e=>setManualAcc(m=>({...m,day:e.target.value}))}> 

                    {DAYS.map(d=><option key={d.id} value={d.id}>{d.id} – {d.label}</option>)} 

                  </select> 

                </div> 

              </div> 

              <button className="btn btn-green" style={{marginBottom:6}} onClick={addManual} disabled={!manualAcc.name}>Add to Trip</button> 

              <button className="btn btn-ghost" onClick={()=>setShowManual(false)}>Cancel</button> 

            </div> 

          )} 

        </div> 

      )} 

 

      {/* LOG VISIT */} 

      {tab==="log" && ( 

        <div className="content"> 

          <div className="sec-label">A · Decision Structure</div> 

          <div className="section-card"> 

            <div className="frow"> 

              <div className="field"><label className="lbl">Account</label><input className="inp" value={form.accountName} onChange={e=>upForm("accountName",e.target.value)} /></div> 

              <div className="field"><label className="lbl">Location</label><input className="inp" value={form.location} onChange={e=>upForm("location",e.target.value)} /></div> 

            </div> 

            <div className="field"> 

              <label className="lbl">Decision Maker ⚠️</label> 

              <input className={`inp ${!form.decisionMaker?"err":""}`} value={form.decisionMaker} onChange={e=>upForm("decisionMaker",e.target.value)} placeholder="Name + role…" /> 

              {!form.decisionMaker && <div className="alert-inline" style={{marginTop:6}}>⚠️ DM not captured</div>} 

            </div> 

            <div className="frow"> 

              <div className="field"><label className="lbl">Influencer</label><input className="inp" value={form.influencer} onChange={e=>upForm("influencer",e.target.value)} /></div> 

              <div className="field"><label className="lbl">Procurement</label><input className="inp" value={form.procurement} onChange={e=>upForm("procurement",e.target.value)} /></div> 

            </div> 

            <div className="frow"> 

              <div className="field"><label className="lbl">Owner</label><input className="inp" value={form.owner} onChange={e=>upForm("owner",e.target.value)} /></div> 

              <div className="field"><label className="lbl">Current Supplier</label><input className="inp" value={form.currentSupplier} onChange={e=>upForm("currentSupplier",e.target.value)} /></div> 

            </div> 

          </div> 

 

          <div className="sec-label">B · Products</div> 

          {form.products.map((p,i)=>{ 

            const catSKUs = lookupSKUs(skuQuery[p.id]||"", p.formCat); 

            const ann = annualise(p.usageRate, p.usageUnit); 

            const lineEAS = p.selectedSKU ? ann*p.selectedSKU.price : 0; 

            return ( 

              <div className="product-block" key={p.id}> 

                <div className="prod-hdr"> 

                  <span className="prod-num">PRODUCT {i+1}{p.selectedSKU?` · ${p.selectedSKU.sku}`:""}</span> 

                  <div style={{display:"flex",gap:6,alignItems:"center"}}> 

                    {p.selectedSKU && <span className="prod-price-tag">${p.selectedSKU.price.toFixed(2)}/{p.selectedSKU.unit}</span>} 

                    {form.products.length>1 && <button className="rm-btn" onClick={()=>rmProd(p.id)}>×</button>} 

                  </div> 

                </div> 

 

                <div className="field"> 

                  <label className="lbl">Category</label> 

                  <select className="sel" value={p.formCat} onChange={e=>{upProd(p.id,"formCat",e.target.value);upProd(p.id,"selectedSKU",null);setSkuQuery(s=>({...s,[p.id]:""}));}}> 

                    <option value="">Select category…</option> 

                    {FORM_CATS.map(c=><option key={c}>{c}</option>)} 

                  </select> 

                </div> 

 

                {p.formCat && p.formCat!=="Other" && !p.selectedSKU && ( 

                  <div className="field sku-search-wrap"> 

                    <label className="lbl">Search SKU</label> 

                    <input className="inp" placeholder={`Search ${p.formCat} SKUs…`} 

                      value={skuQuery[p.id]||""} onChange={e=>setSkuQuery(s=>({...s,[p.id]:e.target.value}))} /> 

                    {catSKUs.length>0 && ( 

                      <div className="sku-suggest"> 

                        {catSKUs.map(s=>( 

                          <div key={s.sku} className="sku-item" onClick={()=>selectSKU(p.id,s)}> 

                            <div className="sku-item-left"> 

                              <div className="sku-code">{s.sku}</div> 

                              <div className="sku-desc">{s.desc}</div> 

                              <div className="sku-unit">{s.unit} · {s.gp}% GP</div> 

                            </div> 

                            <div className="sku-item-right"> 

                              <div className="sku-price">${s.price.toFixed(2)}</div> 

                            </div> 

                          </div> 

                        ))} 

                      </div> 

                    )} 

                  </div> 

                )} 

 

                {p.selectedSKU && ( 

                  <div className="field"> 

                    <label className="lbl">Selected Product</label> 

                    <div className="sku-selected"> 

                      <div className="sku-sel-info"> 

                        <div className="sku-sel-code">{p.selectedSKU.sku} · {p.selectedSKU.unit} · {p.selectedSKU.gp}% GP</div> 

                        <div className="sku-sel-name">{p.selectedSKU.desc}</div> 

                      </div> 

                      <button className="sku-clear" onClick={()=>clearSKU(p.id)}>✕</button> 

                    </div> 

                  </div> 

                )} 

 

                <div className="frow"> 

                  <div className="field"><label className="lbl">Usage Rate</label><input className="inp" type="number" inputMode="decimal" value={p.usageRate} onChange={e=>upProd(p.id,"usageRate",e.target.value)} placeholder="e.g. 20" /></div> 

                  <div className="field"><label className="lbl">Unit</label> 

                    <select className="sel" value={p.usageUnit} onChange={e=>upProd(p.id,"usageUnit",e.target.value)}> 

                      <option>rolls/week</option> 

                      <option>rolls/month</option> 

                      <option>units/week</option> 

                      <option>units/month</option> 

                      <option>pallets/month</option> 

                      <option>units/year</option> 

                    </select> 

                  </div> 

                </div> 

 

                {p.usageRate && p.selectedSKU && ( 

                  <div className="live-calc"> 

                    <div className="lc-row"> 

                      <span className="lc-label">{ann.toLocaleString()} {p.usageUnit.replace("/week","").replace("/month","").replace("/year","").trim()}s/yr @ ${p.selectedSKU.price.toFixed(2)}</span> 

                      <span className="lc-val">${fmt(lineEAS)}/yr</span> 

                    </div> 

                  </div> 

                )} 

 

                <div className="field" style={{marginTop:10}}><label className="lbl">Current Supplier</label><input className="inp" value={p.supplier} onChange={e=>upProd(p.id,"supplier",e.target.value)} placeholder="Who supplies this now?" /></div> 

                <div className="field" style={{marginBottom:0}}><label className="lbl">Pain Point</label><textarea className="tarea" value={p.painPoint} onChange={e=>upProd(p.id,"painPoint",e.target.value)} placeholder="What's broken? Quality? Price? Service?" /></div> 

              </div> 

            ); 

          })} 

          <button className="add-prod" onClick={addProd}>➕ Add Another Product</button> 

 

          <div className="sec-label">C · Commercial</div> 

          <div className="section-card"> 

            <div className="field"><label className="lbl">Trial Agreed?</label> 

              <div className="tog-row"> 

                <button className={`tog ${form.trialAgreed==="Y"?"t-y":""}`} onClick={()=>upForm("trialAgreed",form.trialAgreed==="Y"?null:"Y")}>✓ Yes</button> 

                <button className={`tog ${form.trialAgreed==="N"?"t-n":""}`} onClick={()=>upForm("trialAgreed",form.trialAgreed==="N"?null:"N")}>✗ No</button> 

              </div> 

            </div> 

            <div className="field"><label className="lbl">Quote Required?</label> 

              <div className="tog-row"> 

                <button className={`tog ${form.quoteRequired==="Y"?"t-y":""}`} onClick={()=>upForm("quoteRequired",form.quoteRequired==="Y"?null:"Y")}>✓ Yes</button> 

                <button className={`tog ${form.quoteRequired==="N"?"t-n":""}`} onClick={()=>upForm("quoteRequired",form.quoteRequired==="N"?null:"N")}>✗ No</button> 

              </div> 

            </div> 

            <div className="field"><label className="lbl">Urgency</label> 

              <div className="tog-row"> 

                <button className={`tog ${form.urgency==="H"?"t-h":""}`} onClick={()=>upForm("urgency",form.urgency==="H"?null:"H")}>🔴 High</button> 

                <button className={`tog ${form.urgency==="M"?"t-m":""}`} onClick={()=>upForm("urgency",form.urgency==="M"?null:"M")}>🟡 Med</button> 

                <button className={`tog ${form.urgency==="L"?"t-l":""}`} onClick={()=>upForm("urgency",form.urgency==="L"?null:"L")}>🟢 Low</button> 

              </div> 

            </div> 

            <div className="field" style={{marginBottom:0}}><label className="lbl">Follow-Up Date</label><input className="inp" type="date" value={form.followUpDate} onChange={e=>upForm("followUpDate",e.target.value)} /></div> 

          </div> 

 

          <button className="btn btn-fire" onClick={calculate}>🔥 Calculate Opportunity</button> 

          <button className="btn btn-ghost" onClick={()=>setTab("run")}>← Back to Run Sheet</button> 

        </div> 

      )} 

 

      {/* CATALOGUE */} 

      {tab==="catalogue" && ( 

        <div className="content"> 

          <div className="sec-label" style={{marginBottom:12}}>X-Pak Catalogue · {PRICELIST.length} SKUs</div> 

          <input className="search-box" placeholder="Search SKU or product…" value={catSearch} onChange={e=>setCatSearch(e.target.value)} /> 

          {(catSearch.trim().length>1?[null]:CAT_GROUPS).map((group)=>{ 

            const rows = catSearch.trim().length>1 ? filteredCat : filteredCat.filter(p=>p.cat===group); 

            if (!rows.length) return null; 

            return ( 

              <div className="cat-section" key={group||"search"}> 

                {group && <div className="cat-section-title">{group}</div>} 

                {rows.map(p=>( 

                  <div key={p.sku} className="cat-row" onClick={()=>{ 

                    const f=newForm(); 

                    const matchCat=Object.entries(CAT_MAP).find(([,v])=>v.includes(p.cat)); 

                    f.products[0].formCat=matchCat?matchCat[0]:"Other"; 

                    f.products[0].selectedSKU=p; 

                    setForm(f); setTab("log"); 

                  }}> 

                    <span className="cat-sku">{p.sku}</span> 

                    <span className="cat-name">{p.desc}</span> 

                    <span className="cat-price">${p.price.toFixed(2)}<br/><span className="cat-unit">{p.unit} · {p.gp}%GP</span></span> 

                  </div> 

                ))} 

              </div> 

            ); 

          })} 

        </div> 

      )} 

 

      {/* NOTES */} 

      {tab==="notes" && ( 

        <div className="content"> 

          <div className="sec-label" style={{marginBottom:12}}>Voice Notes · {notes.length} saved</div> 

 

          {/* Record panel */} 

          <div className="section-card" style={{marginBottom:16}}> 

            <div className="field"> 

              <label className="lbl">Account</label> 

              <select className="note-acc-select" value={noteAccount} onChange={e=>setNoteAccount(e.target.value)}> 

                <option value="">General / Trip Note</option> 

                {visits.filter(v=>!v.isTBC).map(v=><option key={v.id} value={v.name}>{v.name} — {v.location}</option>)} 

              </select> 

            </div> 

 

            <button 

              className={`record-btn ${recordState}`} 

              onClick={recordState==="recording" ? stopRecording : startRecording} 

              disabled={recordState==="processing" || recordState==="transcribing"} 

            > 

              {recordState==="idle" && <><span>🎤</span> Tap to Record</>} 

              {recordState==="recording" && <><span>⏹</span> Recording… Tap to Stop</>} 

              {recordState==="transcribing" && <><span>⏳</span> Transcribing with Whisper…</>} 

              {recordState==="processing" && <><span>✨</span> Summarising…</>} 

            </button> 

 

            {transcript && ( 

              <textarea 

                className="transcript-box" 

                value={transcript} 

                onChange={e=>setTranscript(e.target.value)} 

                placeholder="Transcript appears here — you can also type or edit…" 

              /> 

            )} 

 

            {/* API Key entry modal */} 

          {showKeyEntry && ( 

            <div style={{background:"var(--s2)",border:"1px solid var(--accent)",borderRadius:8,padding:14,marginBottom:12}}> 

              <div className="sec-label" style={{marginBottom:8,color:"var(--accent)"}}>🔑 Enter OpenAI API Key</div> 

              <div style={{fontSize:12,color:"var(--muted)",marginBottom:10,lineHeight:1.5}}>Your key is saved only on this device — never shared or uploaded anywhere.</div> 

              <input 

                type="password" 

                className="search-box" 

                placeholder="sk-proj-..." 

                value={keyInput} 

                onChange={e=>setKeyInput(e.target.value)} 

                style={{marginBottom:8}} 

              /> 

              <button className="btn btn-accent" onClick={()=>{ 

                if(keyInput.trim().startsWith("sk-")){ 

                  saveApiKey(keyInput.trim()); 

                  setKeyInput(""); 

                  setShowKeyEntry(false); 

                  summariseNote(); 

                } else { 

                  setRecordError("That doesn't look like a valid key — should start with sk-"); 

                } 

              }}>Save & Summarise</button> 

              <button className="btn btn-ghost" style={{marginTop:4}} onClick={()=>setShowKeyEntry(false)}>Cancel</button> 

            </div> 

          )} 

 

          {/* Clear saved key option */} 

          {getApiKey() && !showKeyEntry && ( 

            <div style={{textAlign:"right",marginBottom:6}}> 

              <button style={{background:"none",border:"none",color:"var(--muted)",fontSize:10,cursor:"pointer"}} onClick={()=>{localStorage.removeItem("xpak_openai_key");setRecordError("API key cleared.");}}>🔑 Clear saved key</button> 

            </div> 

          )} 

 

          {recordError && <div className="alert-inline">⚠️ {recordError}</div>} 

 

            {transcript && recordState!=="processing" && ( 

              <button className="btn btn-fire" onClick={summariseNote}>✨ Summarise with AI</button> 

            )} 

          </div> 

 

          {/* Saved notes */} 

          {notes.length===0 ? ( 

            <div className="empty-notes"> 

              <div className="big">🎤</div> 

              <div>Tap record above, speak your call notes,<br/>then hit Summarise to save them here.</div> 

            </div> 

          ) : notes.map(note=>( 

            <div key={note.id} className="note-card"> 

              <div className="note-card-header"> 

                <div> 

                  <div className="note-account-name">{note.account}</div> 

                  <div className="note-time">{note.date} · {note.time}</div> 

                </div> 

                <button className="del-note" onClick={()=>deleteNote(note.id)}>🗑</button> 

              </div> 

              {note.summary && ( 

                <> 

                  <div className="note-summary-label">AI Summary</div> 

                  <div className="note-summary">{note.summary}</div> 

                </> 

              )} 

              {note.raw && ( 

                <details style={{marginTop:10}}> 

                  <summary style={{fontSize:10,color:"var(--muted)",cursor:"pointer",fontFamily:"var(--mono)"}}>Raw transcript ▾</summary> 

                  <div className="note-raw" style={{marginTop:6}}>{note.raw}</div> 

                </details> 

              )} 

              <button className="btn btn-ghost" style={{marginTop:12,fontSize:11,padding:"8px",letterSpacing:1}} onClick={()=>{ 

                const text = `CALL NOTES — ${note.account} (${note.date} ${note.time})\n\n${note.summary}`; 

                navigator.clipboard.writeText(text).catch(()=>{}); 

                setCopied("note-"+note.id); 

                setTimeout(()=>setCopied(""),2000); 

              }}>{copied==="note-"+note.id?"✅ Copied!":"📋 Copy to CRM"}</button> 

            </div> 

          ))} 

        </div> 

      )} 

 

            {/* OUTPUT */} 

      {tab==="output" && output && ( 

        <div className="content"> 

          <div className="out-hero"> 

            <div className="out-account">{output.accountName} {output.location && <span style={{fontSize:14,color:"var(--muted)",fontWeight:400}}>· {output.location}</span>}</div> 

            <div className="out-grid"> 

              <div><div className="out-val accent">${fmt(output.totalEAS)}</div><div className="out-lbl">Annual Revenue</div></div> 

              <div><div className="out-val green">{output.rank==="A"?"🏆":output.rank==="B"?"📈":"📌"} Rank {output.rank}</div><div className="out-lbl">{output.rank==="A"?"$100k+ Priority":output.rank==="B"?"$30–100k":"Sub-$30k"}</div></div> 

            </div> 

            <div className={`rank-chip rank-${output.rank}`}>RANK {output.rank}</div> 

          </div> 

 

          {output.alerts.map(a=><div key={a} className="alert-inline">⚠️ {a}</div>)} 

 

          <div className="sec-label">Product Breakdown</div> 

          <div className="out-block"> 

            {output.prods.map(p=>{ 

              const s=p.selectedSKU; 

              return ( 

                <div key={p.id} className="prod-out-row"> 

                  <div> 

                    <div className="por-name">{s?s.desc:(p.formCat||"Product")}</div> 

                    <div className="por-sku">{s?`${s.sku} · $${s.price.toFixed(2)}/${s.unit} · ${s.gp}% GP`:"No SKU selected"}</div> 

                    {p.painPoint && <div className="por-pain">💬 {p.painPoint}</div>} 

                  </div> 

                  <div style={{textAlign:"right",marginLeft:10,flexShrink:0}}> 

                    <div className="por-price">{p.lineEAS>0?`$${fmt(p.lineEAS)}`:"—"}</div> 

                    <div className="por-ann">{p.ann>0?`${p.ann.toLocaleString()} units/yr`:"Usage TBC"}</div> 

                  </div> 

                </div> 

              ); 

            })} 

          </div> 

 

          <div className="sec-label">Salesforce Update</div> 

          <div className="out-block"><pre>{output.sfText}</pre></div> 

          <button className="btn btn-ghost" onClick={()=>copy(output.sfText,"sf")}>{copied==="sf"?"✅ Copied!":"📋 Copy CRM Summary"}</button> 

          {copied==="sf" && <div className="copy-ok">Paste into Salesforce</div>} 

 

          <div className="sec-label" style={{marginTop:14}}>Follow-Up Email</div> 

          <div className="out-block"><pre>{output.emailText}</pre></div> 

          <button className="btn btn-ghost" onClick={()=>copy(output.emailText,"email")}>{copied==="email"?"✅ Copied!":"📧 Copy Email Draft"}</button> 

          {copied==="email" && <div className="copy-ok">Ready to send</div>} 

 

          <button className="btn btn-accent" style={{marginTop:14}} onClick={()=>{setForm(newForm());setOutput(null);setTab("log");}}>➕ Log Next Visit</button> 

          <button className="btn btn-ghost" onClick={()=>setTab("run")}>← Back to Run Sheet</button> 

        </div> 

      )} 

 

      {tab==="run" && <button className="fab" onClick={()=>{setForm(newForm());setTab("log");}}>➕</button>} 

    </div> 

  ); 

} 

 

ReactDOM.createRoot(document.getElementById('root')).render(<App />); 

</script> 

</body> 

</html>
