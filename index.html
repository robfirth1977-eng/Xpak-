<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%;overflow:hidden}

.cat-section{margin-bottom:16px}
.cat-section-title{font-family:var(--display);font-weight:900;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);padding:5px 0;border-bottom:1px solid var(--border);margin-bottom:7px}
.cat-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 4px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.cat-row:active{background:var(--s2)}.cat-row:last-child{border-bottom:none}
.cat-sku{font-family:var(--mono);font-size:10px;color:var(--accent);min-width:75px}
.cat-name{font-size:11px;color:var(--text);flex:1;padding:0 8px;line-height:1.3}
.cat-price{font-family:var(--display);font-weight:700;font-size:13px;color:var(--green);white-space:nowrap;text-align:right}
.cat-unit{font-size:9px;color:var(--muted)}
/* NOTES */
.note-card{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:13px;margin-bottom:11px}
.note-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.note-account-name{font-family:var(--display);font-weight:800;font-size:14px;letter-spacing:1px}
.note-time{font-family:var(--mono);font-size:9px;color:var(--muted)}
.note-raw{font-size:12px;color:var(--muted);line-height:1.5;font-style:italic;border-left:2px solid var(--border2);padding-left:10px}
.note-summary{font-size:12px;color:var(--text);line-height:1.6}
.note-summary-label{font-family:var(--display);font-weight:800;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:5px}
.record-btn{width:100%;padding:16px;border:none;border-radius:10px;font-family:var(--display);font-weight:800;font-size:15px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:10px;-webkit-tap-highlight-color:transparent}
.record-btn.idle{background:var(--s2);border:2px dashed var(--border2);color:var(--muted)}
.record-btn.recording{background:var(--red-dim);border:2px solid var(--red);color:var(--red);animation:pulse 1.2s infinite}
.record-btn.transcribing,.record-btn.processing{background:var(--accent-dim);border:2px solid var(--accent);color:var(--accent);animation:pulse 1.2s infinite}
.del-note{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:1.6}
.empty-state .big{font-size:36px;margin-bottom:10px}
/* EXPORT */
.export-card{background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:14px;margin-bottom:14px}
.export-card-title{font-family:var(--display);font-weight:900;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.export-card-desc{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:12px}
/* LOADING */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;background:var(--bg)}
.loading-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>

// ═══ MYOB PARSER ══════════════════════════════════════════════════════════════
function parseMYOB(text){
  const SKIP=["XPAKLOL","CATALOGUE",""];
  const lines=text.split(/\r?\n/);
  const customers={};
  let cur=null;
  for(const line of lines){
    const t=line.trim();if(!t)continue;
    // Customer Total
    const totM=t.match(/^,+(.+?) Total:,?"?([\d,\.]+)"?/);
    if(totM){const n=totM[1].trim();if(customers[n])customers[n].total=parseFloat(totM[2].replace(/,/g,""))||0;cur=null;continue;}
    // Customer header
    const hdrM=t.match(/^([^,]+),(XC\d+|\*None)$/);
    if(hdrM){const n=hdrM[1].trim();if(!customers[n])customers[n]={total:0,byCategory:{},lines:[]};cur=n;continue;}
    // Transaction line (starts with an 8-digit invoice number or date-like number)
    if(cur&&t.match(/^\d{6,8},/)){
      const parts=[];let inQ=false,c="";
      for(const ch of t){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){parts.push(c);c="";}else c+=ch;}
      parts.push(c);
      if(parts.length>=7){
        const sku=(parts[3]||"").trim();
        if(SKIP.includes(sku.toUpperCase()))continue;
        const amount=parseFloat((parts[6]||"0").replace(/,/g,""))||0;
        if(amount<=0)continue;
        let cat="Other";
        const skuL=sku.toLowerCase();
        for(const p of PRICELIST){if(p.sku.toLowerCase()===skuL){cat=p.cat;break;}}
        if(cat==="Other"){for(const p of PRICELIST){if(p.sku.toLowerCase().startsWith(skuL.substring(0,4))){cat=p.cat;break;}}}
        customers[cur].byCategory[cat]=(customers[cur].byCategory[cat]||0)+amount;
        customers[cur].lines.push({sku,desc:parts[4],amount,cat});
      }
    }
  }
  return customers;
}

// ═══ SF CSV PARSER ════════════════════════════════════════════════════════════
function parseSFCSV(text){
  const lines=text.trim().split('\n');if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  const nameIdx=headers.findIndex(h=>h.toLowerCase().includes('account name')||h.toLowerCase()==='name');
  const cityIdx=headers.findIndex(h=>h.toLowerCase().includes('city')||h.toLowerCase().includes('location')||h.toLowerCase().includes('shipping'));
  const industryIdx=headers.findIndex(h=>h.toLowerCase().includes('industry')||h.toLowerCase().includes('category'));
  const accounts=[];
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].match(/(".*?"|[^,]+)(?=,|$)/g)||[];
    const clean=cols.map(c=>c.replace(/^"|"$/g,'').trim());
    const name=nameIdx>=0?clean[nameIdx]:"";if(!name)continue;
    accounts.push({id:Date.now()+Math.random()+i,name,location:cityIdx>=0?clean[cityIdx]:"",category:industryIdx>=0?clean[industryIdx]:"",status:"planned",eas:0,day:"",date:"",sortOrder:i,visitDetail:null,myobHistory:null});
  }
  return accounts;
}

// ═══ SF EXPORT CSV ════════════════════════════════════════════════════════════
function generateSFExport(visits,tripName){
  const visited=visits.filter(v=>v.visitDetail&&["visited","done","follow"].includes(v.status));
  if(!visited.length)return null;
  const csv=val=>`"${String(val).replace(/"/g,'""')}"`;
  // Accounts sheet
  const accH=["Account Name","Account Status","EST Annual $","EST Annual GP $","Primary Product","Last Contact Date","Next Contact Date","Visit Frequency","Key notes","Existing Supplier (SF)","Mode of Transport"].map(csv).join(",");
  const accR=visited.map(v=>{
    const d=v.visitDetail;
    const annGP=d.totalEAS?Math.round(d.totalEAS*(d.avgGP||40)/100):0;
    const topCat=d.prods?.find(p=>p.selectedSKU)?.selectedSKU?.cat||"";
    return[v.name,d.accountStatus||"Buying",d.totalEAS?Math.round(d.totalEAS):"",annGP||"",topCat,todayStr(),d.followUpDate||"",d.visitFrequency||"",d.keyNotes||"",d.existingSupplier||"",d.modeOfTransport||""].map(csv).join(",");
  });
  // Tasks sheet
  const taskH=["Subject","Comments","Due Date","Status","Task Type","Related To"].map(csv).join(",");
  const taskR=visited.map(v=>{
    const d=v.visitDetail;
    return[`Sales Visit - ${v.name} - ${todayStr()}`,d.sfText||"",d.followUpDate||"","Not Started","Call",v.name].map(csv).join(",");
  });
  return{
    accsCSV:[accH,...accR].join("\n"),
    tasksCSV:[taskH,...taskR].join("\n"),
    count:visited.length
  };
}

function downloadCSV(content,filename){
  const blob=new Blob([content],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

          <div className="form-section-title">C · Products</div>
          {form.products.map((prod,pi)=>(
            <div key={prod.id} className="prod-block">
              <div className="prod-block-title">Product {pi+1}</div>
              <div className="field"><label className="lbl">Category</label>
                <select className="inp" value={prod.formCat} onChange={e=>{const v=e.target.value;setForm(f=>({...f,products:f.products.map((p,i)=>i===pi?{...p,formCat:v,selectedSKU:null}:p)}));setSkuQuery(q=>({...q,[prod.id]:""}));}}>
                  <option value="">Select category…</option>{CATEGORIES.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              {prod.formCat&&<div className="field">
                <label className="lbl">SKU</label>
                <input className="inp" placeholder="Search SKU or description…" value={skuQuery[prod.id]||""} onChange={e=>setSkuQuery(q=>({...q,[prod.id]:e.target.value}))}/>
                {!prod.selectedSKU&&<div className="sku-list">
                  {lookupSKUs(skuQuery[prod.id],prod.formCat).map(s=>(
                    <div key={s.sku} className="sku-item" onClick={()=>setForm(f=>({...f,products:f.products.map((p,i)=>i===pi?{...p,selectedSKU:s}:p)}))}>
                      <div><div className="sku-code">{s.sku}</div><div className="sku-desc">{s.desc}</div></div>
                      <div style={{textAlign:"right"}}><div className="sku-price">${s.price}</div><div className="sku-gp">{s.gp}% GP</div></div>
                    </div>
                  ))}
                </div>}
                {prod.selectedSKU&&<div className="sku-selected">
                  <div><div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--green)"}}>{prod.selectedSKU.sku}</div><div style={{fontSize:11}}>{prod.selectedSKU.desc}</div><div style={{fontSize:10,color:"var(--accent)"}}>${prod.selectedSKU.price} · {prod.selectedSKU.gp}% GP</div></div>
                  <button className="sku-clear" onClick={()=>setForm(f=>({...f,products:f.products.map((p,i)=>i===pi?{...p,selectedSKU:null}:p)}))}>✕</button>
                </div>}
              </div>}
              <div className="inp-row">
                <div className="field"><label className="lbl">Usage Rate</label><input className="inp" type="number" value={prod.usageRate} onChange={e=>setForm(f=>({...f,products:f.products.map((p,i)=>i===pi?{...p,usageRate:e.target.value}:p)}))} placeholder="0"/></div>
                <div className="field"><label className="lbl">Per</label>
                  <select className="inp" value={prod.usageUnit} onChange={e=>setForm(f=>({...f,products:f.products.map((p,i)=>i===pi?{...p,usageUnit:e.target.value}:p)}))}>
                    {["rolls/week","rolls/month","bags/week","bags/month","units/week","units/month","pallets/month","ctns/month"].map(u=><option key={u}>{u}</option>)}
                  </select>
                </div>
              </div>
              {prod.selectedSKU&&prod.usageRate&&<div className="live-calc">
                <div className="lc-row"><span className="lc-label">Annual units</span><span className="lc-val">{fmt(annualise(parseFloat(prod.usageRate),prod.usageUnit))}</span></div>
                <div className="lc-row"><span className="lc-label">Annual revenue</span><span className="lc-val">{fmtK(annualise(parseFloat(prod.usageRate),prod.usageUnit)*prod.selectedSKU.price)}</span></div>
                <div className="lc-row"><span className="lc-label">GP</span><span className="lc-val">{prod.selectedSKU.gp}%</span></div>
              </div>}
              <div className="field"><label className="lbl">Pain Point / Competitor</label><input className="inp" value={prod.painPoint} onChange={e=>setForm(f=>({...f,products:f.products.map((p,i)=>i===pi?{...p,painPoint:e.target.value}:p)}))} placeholder="e.g. Fromm, price issues…"/></div>
              {form.products.length>1&&<button className="btn btn-ghost" style={{padding:"7px",fontSize:11}} onClick={()=>setForm(f=>({...f,products:f.products.filter((_,i)=>i!==pi)}))}>Remove</button>}
            </div>
          ))}
          <button className="add-prod" onClick={()=>setForm(f=>({...f,products:[...f.products,newProd()]}))}>+ Add Another Product</button>
        </div>

        <div className="form-section">
          <div className="form-section-title">D · Commercial</div>
          <div className="section-card">
            <div className="field"><label className="lbl">Trial Agreed?</label>
              <div className="tog-row">{["Y","N"].map(v=><button key={v} className={`tog ${form.trialAgreed===v?(v==="Y"?"t-y":"t-n"):""}`} onClick={()=>setForm(f=>({...f,trialAgreed:v}))}>{v==="Y"?"Yes":"No"}</button>)}</div>
            </div>
            <div className="field"><label className="lbl">Quote Required?</label>
              <div className="tog-row">{["Y","N"].map(v=><button key={v} className={`tog ${form.quoteRequired===v?(v==="Y"?"t-y":"t-n"):""}`} onClick={()=>setForm(f=>({...f,quoteRequired:v}))}>{v==="Y"?"Yes":"No"}</button>)}</div>
            </div>
            <div className="field"><label className="lbl">Urgency</label>
              <div className="tog-row">{[["H","🔥 High"],["M","Medium"],["L","Low"]].map(([v,l])=><button key={v} className={`tog ${form.urgency===v?`t-${v.toLowerCase()}`:""}`} onClick={()=>setForm(f=>({...f,urgency:v}))}>{l}</button>)}</div>
            </div>
            <div className="field"><label className="lbl">Follow-Up Date</label><input className="inp" type="date" value={form.followUpDate} onChange={e=>setForm(f=>({...f,followUpDate:e.target.value}))}/></div>
            <div className="field"><label className="lbl">Key Notes (SF Key Notes field)</label><textarea className="inp" value={form.keyNotes} onChange={e=>setForm(f=>({...f,keyNotes:e.target.value}))} placeholder="Key observations for CRM…"/></div>
          </div>
        </div>

        <button className="btn btn-fire" onClick={generateOutput}>⚡ Generate Output</button>
        <button className="btn btn-ghost" onClick={()=>{setForm(newForm());setTab("run");}}>Cancel</button>
      </div>}

      {/* ── CATALOGUE ── */}
      {tab==="catalogue"&&<div className="content">
        <input className="search-box" placeholder="Search SKU or description…" value={catSearch} onChange={e=>setCatSearch(e.target.value)}/>
        {CATEGORIES.map(cat=>{
          const items=PRICELIST.filter(p=>p.cat===cat&&(!catSearch||(p.sku.toLowerCase().includes(catSearch.toLowerCase())||p.desc.toLowerCase().includes(catSearch.toLowerCase()))));
          if(!items.length)return null;
          return(
            <div key={cat} className="cat-section">
              <div className="cat-section-title">{cat}</div>
              {items.map(p=>(
                <div key={p.sku} className="cat-row" onClick={()=>{setForm(f=>({...f,products:f.products.map((prod,i)=>i===f.products.length-1?{...prod,formCat:cat,selectedSKU:p}:prod)}));setTab("log");}}>
                  <div className="cat-sku">{p.sku}</div>
                  <div className="cat-name">{p.desc}</div>
                  <div style={{textAlign:"right"}}><div className="cat-price">${p.price}</div><div className="cat-unit">{p.unit} · {p.gp}% GP</div></div>
                </div>
              ))}
            </div>
          );
        })}
      </div>}

      {/* ── NOTES ── */}
      {tab==="notes"&&<div className="content">
        <div className="sec-label">Voice Notes · {notes.length} saved</div>
        {!isArchived&&<div className="section-card" style={{marginBottom:14}}>
          <div className="field"><label className="lbl">Account</label>
            <select className="inp" value={noteAccount} onChange={e=>setNoteAccount(e.target.value)}>
              <option value="">General / Trip Note</option>
              {visits.filter(v=>!v.isTBC).map(v=><option key={v.id} value={v.name}>{v.name} — {v.location}</option>)}
            </select>
          </div>
          {showKeyEntry&&<div style={{background:"var(--s2)",border:"1px solid var(--accent)",borderRadius:8,padding:13,marginBottom:11}}>
            <div className="sec-label" style={{marginBottom:7}}>🔑 OpenAI API Key</div>
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:9,lineHeight:1.5}}>Saved only on this device.</div>
            <input type="password" className="inp" style={{marginBottom:7}} placeholder="sk-proj-…" value={keyInput} onChange={e=>setKeyInput(e.target.value)}/>
            <button className="btn btn-accent" onClick={()=>{if(keyInput.trim().startsWith("sk-")){saveApiKey(keyInput.trim());setKeyInput("");setShowKeyEntry(false);}else setRecordError("Invalid key");}}>Save Key</button>
            <button className="btn btn-ghost" style={{marginTop:4}} onClick={()=>setShowKeyEntry(false)}>Cancel</button>
          </div>}
          {getApiKey()&&!showKeyEntry&&<div style={{textAlign:"right",marginBottom:5}}><button style={{background:"none",border:"none",color:"var(--muted)",fontSize:10,cursor:"pointer"}} onClick={()=>{localStorage.removeItem("xpak_openai_key");setRecordError("Key cleared.");}}>🔑 Clear key</button></div>}
          <button className={`record-btn ${recordState}`} onClick={recordState==="recording"?stopRecording:startRecording} disabled={recordState==="processing"||recordState==="transcribing"}>
            {recordState==="idle"&&<><span>🎤</span>Tap to Record</>}
            {recordState==="recording"&&<><span>⏹</span>Recording… Tap to Stop</>}
            {recordState==="transcribing"&&<><span>⏳</span>Transcribing…</>}
            {recordState==="processing"&&<><span>✨</span>Summarising…</>}
          </button>
          {transcript&&<textarea className="inp" style={{marginBottom:7}} value={transcript} onChange={e=>setTranscript(e.target.value)}/>}
          {recordError&&<div className="alert-inline">⚠️ {recordError}</div>}
          {transcript&&recordState==="idle"&&<button className="btn btn-fire" onClick={summariseNote}>✨ Summarise with AI</button>}
        </div>}
        {notes.length===0?<div className="empty-state"><div className="big">🎤</div><div>No notes yet.</div></div>
          :notes.map(note=>(
          <div key={note.id} className="note-card">
            <div className="note-card-header">
              <div><div className="note-account-name">{note.account}</div><div className="note-time">{note.date} · {note.time}</div></div>
              {!isArchived&&<button className="del-note" onClick={()=>updateNotes(notes.filter(x=>x.id!==note.id))}>🗑</button>}
            </div>
            {note.summary&&<><div className="note-summary-label">AI Summary</div><div className="note-summary">{note.summary}</div></>}
            {note.raw&&<details style={{marginTop:8}}><summary style={{fontSize:10,color:"var(--muted)",cursor:"pointer",fontFamily:"var(--mono)"}}>Raw transcript ▾</summary><div className="note-raw" style={{marginTop:5}}>{note.raw}</div></details>}
            <button className="btn btn-ghost" style={{marginTop:10,fontSize:10,padding:"7px",letterSpacing:1}} onClick={()=>copy(`CALL NOTES — ${note.account} (${note.date} ${note.time})\n\n${note.summary}`,"note-"+note.id)}>{copied==="note-"+note.id?"✅ Copied!":"📋 Copy to CRM"}</button>
          </div>
        ))}
      </div>}

      {/* ── OUTPUT ── */}
      {tab==="output"&&output&&<div className="content">
        <div className="out-hero">
          <div className="out-account">{output.accountName}</div>
          <div style={{fontSize:11,color:"var(--muted)",marginBottom:8}}>📍 {output.location}</div>
          <div className="out-grid">
            <div><div className="out-val green">{fmtK(output.totalEAS)}</div><div className="out-lbl">Est. Annual Revenue</div></div>
            <div><div className="out-val accent">{fmtK(output.totalGPAmt)}</div><div className="out-lbl">Est. Annual GP ({output.avgGP}%)</div></div>
          </div>
          <div className={`rank-chip rank-${output.rank}`}>⭐ {output.rank}-Account</div>
        </div>
        {output.alerts.length>0&&<div className="alert-inline">⚠️ {output.alerts.join(" · ")}</div>}
        <div className="out-block">
          {output.prods.map((p,i)=>{const s=p.selectedSKU;return<div key={i} className="prod-out-row"><div><div className="por-name">{s?s.desc:(p.formCat||"Product")}</div>{s&&<div className="por-sku">{s.sku}</div>}{p.painPoint&&<div style={{fontSize:10,color:"var(--accent)",marginTop:2}}>{p.painPoint}</div>}</div><div style={{textAlign:"right"}}>{s&&<div className="por-price">${s.price}</div>}{p.ann&&<div className="por-ann">{fmt(p.ann)} {p.usageUnit}</div>}</div></div>;})}
        </div>
        <div className="out-block">
          <div style={{fontSize:10,fontWeight:600,marginBottom:7,color:"var(--muted)"}}>SALESFORCE CRM TEXT</div>
          <pre>{output.sfText}</pre>
        </div>
        {copied==="sf"&&<div className="copy-ok">✅ Copied!</div>}
        <button className="btn btn-accent" onClick={()=>copy(output.sfText,"sf")}>📋 Copy CRM Summary</button>
        <div className="out-block" style={{marginTop:4}}>
          <div style={{fontSize:10,fontWeight:600,marginBottom:7,color:"var(--muted)"}}>FOLLOW-UP EMAIL</div>
          <pre>{output.emailText}</pre>
        </div>
        {copied==="email"&&<div className="copy-ok">✅ Copied!</div>}
        <button className="btn btn-ghost" onClick={()=>copy(output.emailText,"email")}>📋 Copy Email</button>
        <button className="btn btn-ghost" onClick={()=>{setForm(newForm());setTab("log");}}>+ Log Another Visit</button>
      </div>}

      {/* ── EXPORT ── */}
      {tab==="export"&&<div className="content">
        <div className="sec-label">Salesforce Export</div>

        {/* Mid-trip MYOB */}
        <div className="export-card">
          <div className="export-card-title" style={{color:"var(--blue)"}}>📊 Upload / Update MYOB History</div>
          <div className="export-card-desc">Already on a trip? Paste your MYOB customer detail export here to add purchase history to all account cards.</div>
          <textarea className="inp" style={{minHeight:70,fontSize:11}} placeholder="Paste MYOB export here…" onChange={e=>{if(e.target.value)handleMidTripMYOB(e.target.value);}}/>
          {Object.keys(myobData).length>0&&<div style={{fontSize:11,color:"var(--green)",marginTop:5,fontWeight:600}}>✅ {Object.keys(myobData).length} customers loaded</div>}
        </div>

        {/* SF Export */}
        {(()=>{
          const exp=generateSFExport(visits);
          const visitedCount=visits.filter(v=>v.visitDetail&&["visited","done","follow"].includes(v.status)).length;
          return(
            <div className="export-card">
              <div className="export-card-title" style={{color:"var(--accent)"}}>☁️ End of Day — Salesforce CSV Export</div>
              <div className="export-card-desc">
                Generates <strong style={{color:"var(--text)"}}>two CSV files</strong> for Salesforce Data Import Wizard:<br/><br/>
                <strong style={{color:"var(--text)"}}>1. Account Updates CSV</strong> — updates EST Annual $, EST Annual GP $, Primary Product, Last Contact Date, Next Contact Date, Visit Frequency, Key Notes, Existing Supplier, Mode of Transport. Match on Account Name.<br/><br/>
                <strong style={{color:"var(--text)"}}>2. Tasks CSV</strong> — creates a "Sales Visit" task for each account visited, with full comments, due date, and Related To.<br/><br/>
                {visitedCount>0
                  ?<span style={{color:"var(--green)",fontWeight:600}}>{visitedCount} visit{visitedCount>1?"s":""} ready to export.</span>
                  :<span style={{color:"var(--muted)"}}>No visits logged yet — log some visits first.</span>}
              </div>
              {exp?<>
                <button className="btn btn-accent" onClick={()=>downloadCSV(exp.accsCSV,`xpak_accounts_${new Date().toLocaleDateString("en-AU").replace(/\//g,"-")}.csv`)}>⬇️ Download Account Updates CSV</button>
                <button className="btn btn-blue" onClick={()=>downloadCSV(exp.tasksCSV,`xpak_tasks_${new Date().toLocaleDateString("en-AU").replace(/\//g,"-")}.csv`)}>⬇️ Download Tasks CSV</button>
                <div style={{fontSize:10,color:"var(--muted)",lineHeight:1.7,marginTop:4}}>
                  <strong style={{color:"var(--text)"}}>Import steps:</strong><br/>
                  1. SF → Setup → Data Import Wizard → Accounts & Contacts → Update → match on Account Name → upload Account Updates CSV<br/>
                  2. SF → Setup → Data Import Wizard → Activities → Insert → upload Tasks CSV
                </div>
              </>:<div style={{fontSize:12,color:"var(--muted)",textAlign:"center",padding:"10px 0"}}>Log some visits to generate export.</div>}
            </div>
          );
        })()}
      </div>}

      {/* ARCHIVE MODAL */}
      {showArchiveConfirm&&<div className="modal-overlay" onClick={()=>setShowArchiveConfirm(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-title">Archive Trip?</div>
          <div className="modal-sub">All visit data and notes are saved. You can still view this trip anytime.</div>
          <button className="btn btn-fire" onClick={archiveTrip}>✅ Archive & Complete</button>
          <button className="btn btn-ghost" onClick={()=>setShowArchiveConfirm(false)}>Cancel</button>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
